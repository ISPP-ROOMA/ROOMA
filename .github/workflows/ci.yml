name: CI

on:
  push:
    branches:
      - feat/**
      - fix/**
      - trunk-**
      - trunk
      - main
  pull_request:
    branches:
      - main

jobs:

  backend:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('backend/pom.xml') }}

      - name: Run tests + dependency-check
        if: github.ref == 'refs/heads/main'
        run: ./mvnw clean verify
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
      
      - name: Run tests (without dependency-check)
        if: github.ref != 'refs/heads/main'
        run: ./mvnw clean test

  frontend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: user
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Start backend
        working-directory: backend
        run: |
          chmod +x mvnw
          ./mvnw -DskipTests spring-boot:run > ../backend.log 2>&1 &

      - name: Wait for backend
        run: |
          for i in {1..90}; do
            if curl -fsS http://127.0.0.1:8080/swagger-ui/index.html > /dev/null; then
              echo "Backend ready"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not start in time"
          tail -n 200 ../backend.log || true
          exit 1

      - name: Start frontend
        run: VITE_API_URL=http://localhost:8080/api npm run dev -- --host localhost --port 5173 > ../frontend.log 2>&1 &

      - name: Wait for frontend
        run: |
          for i in {1..90}; do
            if curl -fsS http://localhost:5173 > /dev/null; then
              echo "Frontend ready"
              exit 0
            fi
            sleep 2
          done
          echo "Frontend did not start in time"
          tail -n 200 ../frontend.log || true
          exit 1

      - name: Lint
        run: npm run lint

      - name: Run Playwright tests
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173
          PLAYWRIGHT_API_URL: http://localhost:8080/api
          DOTENV_CONFIG_QUIET: "true"
          PLAYWRIGHT_JUNIT_OUTPUT_NAME: junit.xml
          PLAYWRIGHT_JUNIT_OUTPUT_DIR: test-results
        run: npx playwright test --reporter=line,html,junit

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/test-results
          if-no-files-found: ignore

      - name: NPM audit
        run: npm audit --audit-level=high || true


  codacy-analysis:
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Run Codacy Analysis
        uses: codacy/codacy-analysis-cli-action@v4
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}